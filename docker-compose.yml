services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 10

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "9275:8000"
    volumes:
      - chroma-data:/chroma/chroma
    
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
    depends_on:
      postgres:
        condition: service_healthy
    command: ["./docker/migrate.sh"]
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    ports:
      - "8000:8000"
    command: ["python", "main.py"]
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    command: ["python", "worker.py"]
    restart: unless-stopped

  orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydb
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "orchestrator.py"]
    restart: unless-stopped

volumes:
  postgres-data:
  rabbitmq-data:
  chroma-data:
